name: Build & Run Platform Mapping Generation Verification
run-name: Build & Run Platform Mapping Generation Verification
on:
  pull_request:
    paths:
      - fboss/lib/platform_mapping_v2/**
jobs:
  Platform-Mapping-Generation-Build:
    runs-on: 32-core-ubuntu
    steps:
      - run: echo "Confirming hardware specications:"; sudo lscpu
      - name: Clean workspace
        run: sudo rm -rf ${{ github.workspace }}/*
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Run Docker-based build for FBOSS
        run: >
          sudo
          ./fboss/oss/scripts/docker-build.py
          --scratch-path
          ${{ github.workspace }}/build-output
          --target
          fboss_platform_mapping_gen
          --no-docker-output
          --env-var
          GITHUB_ACTIONS_BUILD
          --local
          &&
          sudo
          chown
          -R
          runner:runner
          ${{ github.workspace }}
      - name: Package FBOSS binaries and library dependencies
        run: >
          sudo
          docker
          run
          -v
          ${{ github.workspace }}:/var/FBOSS/fboss:z
          -v
          ${{ github.workspace }}/build-output:/var/FBOSS/tmp_bld_dir:z
          --cap-add=CAP_AUDIT_WRITE
          --name
          FBOSS_PACKAGE_CONTAINER
          fboss_image:latest
          bash -c
          "set -ex &&
          python3 /var/FBOSS/fboss/fboss/oss/scripts/package-fboss.py --copy-root-libs --scratch-path=/var/FBOSS/tmp_bld_dir --compress &&
          python3 -m pip install --no-deps /var/FBOSS/tmp_bld_dir/installed/fbthrift-python/share/thrift/wheels/*.whl &&
          mkdir -p /usr/local/lib64/python3.12/site-packages &&
          cp -r /var/FBOSS/tmp_bld_dir/installed/folly-python/lib64/python3.12/site-packages/folly /usr/local/lib64/python3.12/site-packages/ &&
          for d in /var/FBOSS/tmp_bld_dir/installed/*/lib /var/FBOSS/tmp_bld_dir/installed/*/lib64; do
            if [ -d \"\$d\" ]; then find \"\$d\" -maxdepth 1 -name '*.so*' -exec cp -an {} /usr/local/lib64/ \\; ; fi; done &&
          ldconfig"
      - name: Save Docker image with Python runtime
        run: |
          sudo docker commit FBOSS_PACKAGE_CONTAINER fboss_image:latest
          sudo docker rm FBOSS_PACKAGE_CONTAINER
          sudo docker save fboss_image:latest | zstd -o ${{ github.workspace }}/build-output/fboss_docker_image.tar.zst
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fboss
          path: |
            ${{ github.workspace }}/build-output/fboss_bins.tar.zst
            ${{ github.workspace }}/build-output/fboss_docker_image.tar.zst
          # Explicitly set the retention at the object level
          retention-days: 14
  Platform-Mapping-Generation-Verification:
    runs-on: ubuntu-latest
    needs: Platform-Mapping-Generation-Build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Download artifact with test binaries
        uses: actions/download-artifact@v7
        with:
          name: fboss
      - run: ls ${{ github.workspace }}
      - name: Load Docker image
        run: zstd -dc ${{ github.workspace }}/fboss_docker_image.tar.zst | sudo docker load
      - name: Run unit tests
        run: >
          sudo
          ./fboss/oss/scripts/github_actions/docker-unittest.py
          ${{ github.workspace }}/fboss_bins.tar.zst
          &&
          sudo
          chown
          -R
          runner:runner
          ${{ github.workspace }}
