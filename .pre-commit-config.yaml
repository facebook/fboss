# General excludes, files can also be excluded on a hook level
exclude: ^build/.*
repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.2
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: [--style=file, --verbose]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x, --severity=warning]
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.11.0-1
    hooks:
      - id: shfmt
        args: [-w, -s, -i, '2']
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # asic_config_v3 generated outputs are multi-document YAML with complex
        # mapping keys that PyYAML cannot load; they are generated artifacts.
        exclude: ^fboss/lib/asic_config_v3/generated_asic_configs/
      - id: check-json
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      # Ruff linter for all Python files in fboss/
      - id: ruff-check
        files: ^fboss/
        args: [--fix]
      # Ruff formatter for all Python files in fboss/
      - id: ruff-format
        files: ^fboss/
  # TODO: Uncomment once existing violations are fixed (run
  # `fboss/oss/scripts/buck_cmake_dep_checker.py --check-files --check-sorted --from-commit HEAD~1`
  # to see what would be flagged on a given commit).
  # - repo: local
  #   hooks:
  #     - id: buck-cmake-checker
  #       name: Check BUCK/cmake file-list consistency and sort order
  #       language: system
  #       entry: fboss/oss/scripts/buck_cmake_dep_checker.py --check-files --check-sorted --from-commit
  #       args: [HEAD~1]
  #       pass_filenames: false
  #       always_run: true

  - repo: local
    hooks:
      - id: do-not-change-fboss-manifests
        name: Prevent sai_impl in fboss manifest
        language: system
        entry: >-
          bash -c 'if git diff --cached -- build/fbcode_builder/manifests/fboss
          | grep -q "^+.*sai_impl"; then echo "ERROR: Do not commit changes to
          build/fbcode_builder/manifests (common mistake with git commit -a)"
          >&2; exit 1; fi'
        pass_filenames: false
        # always_run is required because the top-level "exclude: ^build/.*"
        # would suppress this hook if we used "files:" to scope it instead.
        # The git diff --cached inside the entry does the scoping itself.
        always_run: true
